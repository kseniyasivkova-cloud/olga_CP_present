<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="slides-format" content="viewport">
    <title id="page-title">Запуск Премиального Эксперта — Коммерческое предложение</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-bg: #0d0e0b;
            --color-bg-deep: #080907;
            --color-surface: #161810;
            --color-text: #f5f0e8;
            --color-text-secondary: #d4c9b0;
            --color-text-muted: #8a8070;
            --color-accent-1: #c9a84c;
            --color-accent-2: #e8d5a0;
            --color-accent-3: #8b6e2a;
            --color-glass-bg: rgba(255,255,255,0.05);
            --color-glass-border: rgba(201,168,76,0.18);
            --color-vignette: rgba(0,0,0,0.5);
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'Manrope', sans-serif;
        }
    </style>
    <style>
        :root {
            --color-bg: #0d0e0b;
            --color-text: #f5f0e8;
            --glow-color-rgb: 201,168,76;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body { background: var(--color-bg); margin: 0; }
        body { font-family: 'Manrope', sans-serif; color: var(--color-text); overflow: hidden; height: 100vh; width: 100vw; }
        .deck { width: 100vw; height: 100vh; position: relative; }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--color-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transform: scale(0.95); transition: opacity 0.7s ease, transform 0.7s ease; pointer-events: none; overflow: hidden; }
        .slide.active { opacity: 1; transform: scale(1); pointer-events: all; }
        .slide > .content { position: relative; z-index: 2; width: 100%; max-width: 1100px; padding: clamp(1.5rem, 4vw, 3.5rem); }
        .nav-controls { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 16px; z-index: 100; background: rgba(201,168,76,0.08); backdrop-filter: blur(10px); padding: 8px 22px; border-radius: 40px; border: 1px solid rgba(201,168,76,0.2); }
        .nav-btn { width: 38px; height: 38px; border: none; background: rgba(201,168,76,0.1); color: #c9a84c; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.3s; }
        .nav-btn:hover { background: rgba(201,168,76,0.2); }
        .slide-dots { display: flex; gap: 7px; }
        .slide-dots .dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(201,168,76,0.2); cursor: pointer; transition: background 0.3s, transform 0.3s; }
        .slide-dots .dot.active { background: #c9a84c; transform: scale(1.3); }
        .slide-counter { font-size: 0.75rem; color: #8a8070; min-width: 38px; text-align: center; font-family: 'Manrope', sans-serif; }
        .reveal { opacity: 0; transform: translateY(20px); }
        .text-glow { text-shadow: 0 0 20px rgba(201,168,76,0.5), 0 0 40px rgba(201,168,76,0.2); }
        .stat-glow { text-shadow: 0 0 30px rgba(201,168,76,0.7), 0 0 60px rgba(201,168,76,0.3); }
        @keyframes glow-pulse {
            0%, 100% { text-shadow: 0 0 20px rgba(201,168,76,0.4), 0 0 40px rgba(201,168,76,0.15); }
            50% { text-shadow: 0 0 35px rgba(201,168,76,0.8), 0 0 70px rgba(201,168,76,0.3); }
        }
        .glow-pulse { animation: glow-pulse 3s ease-in-out infinite; }
        @keyframes float-slow {
            0% { transform: translate(0,0) scale(1); }
            25% { transform: translate(60px,-50px) scale(1.12); }
            50% { transform: translate(-40px,40px) scale(0.9); }
            75% { transform: translate(50px,20px) scale(1.08); }
            100% { transform: translate(0,0) scale(1); }
        }
        @keyframes float-drift {
            0% { transform: translate(0,0) scale(1) rotate(0deg); }
            33% { transform: translate(-50px,-60px) scale(1.15) rotate(3deg); }
            66% { transform: translate(40px,30px) scale(0.88) rotate(-2deg); }
            100% { transform: translate(0,0) scale(1) rotate(0deg); }
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
        .gradient-mesh { position: absolute; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); animation: float-slow 12s ease-in-out infinite; }
        .blob:nth-child(2) { animation: float-drift 16s ease-in-out infinite; }
        .blob:nth-child(3) { animation: float-slow 20s ease-in-out infinite reverse; }
        .slide::before {
            content: ''; position: absolute; inset: 0; z-index: 1; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            background-repeat: repeat; background-size: 256px; opacity: 0.04; mix-blend-mode: overlay;
        }
        .slide::after {
            content: ''; position: absolute; inset: 0; z-index: 1; pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, var(--color-vignette) 100%);
        }
        .bar-fill { transition: width 0.7s ease; }
        .funnel-arrow { clip-path: polygon(0 0, 85% 0, 100% 50%, 85% 100%, 0 100%); }
        .divider-line { height: 1px; background: linear-gradient(to right, transparent, #c9a84c, transparent); }
        .gold-line { width: 60px; height: 3px; background: linear-gradient(to right, #c9a84c, #e8d5a0); border-radius: 2px; }
        .stage-badge { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #c9a84c, #8b6e2a); font-weight: 700; font-size: 0.9rem; flex-shrink: 0; }
        .price-tag { background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05)); border: 1px solid rgba(201,168,76,0.3); border-radius: 12px; padding: 1rem 1.5rem; }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.2s !important; }
        }
    </style>
</head>
<body>

<div class="mouse-spotlight" style="position:fixed;inset:0;z-index:99;pointer-events:none;"></div>
<div class="deck" id="deck"></div>

<div class="nav-controls">
    <button class="nav-btn" onclick="changeSlide(-1)">&#8249;</button>
    <div class="slide-dots" id="dots"></div>
    <button class="nav-btn" onclick="changeSlide(1)">&#8250;</button>
    <span class="slide-counter" id="counter">1 / 16</span>
</div>

<script src="content.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ РЕНДЕРА
// ═══════════════════════════════════════════════════════════

function mesh(configs) {
    return `<div class="gradient-mesh">${configs.map(c => `<div class="blob" style="${c}"></div>`).join('')}</div>`;
}

function stageHeader(d) {
    const priceLabel  = d.priceLabel  || 'Стоимость';
    const priceValue  = d.price       || d.priceValue || '';
    const priceSuffix = d.priceSuffix || `${d.format} · ${d.duration}`;
    const priceStyle  = d.price
        ? 'font-size:1.6rem;font-weight:700;color:#c9a84c;'
        : 'font-size:1.1rem;font-weight:700;color:#c9a84c;';
    const priceClass  = d.price ? 'class="glow-pulse"' : '';
    return `
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;" class="reveal">
        <div class="stage-badge">${d.stageNum}</div>
        <div>
            <div style="font-size:0.75rem;color:#8a8070;letter-spacing:0.2em;text-transform:uppercase;">${d.stagePeriod}</div>
            <h2 style="font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,3.2vw,2.6rem);font-weight:700;color:#f5f0e8;line-height:1.1;">${d.title}</h2>
        </div>
        <div class="price-tag ml-auto" style="text-align:center;flex-shrink:0;">
            <div style="font-size:0.7rem;color:#8a8070;text-transform:uppercase;letter-spacing:0.1em;">${priceLabel}</div>
            <div style="${priceStyle}" ${priceClass}>${priceValue}</div>
            <div style="font-size:0.7rem;color:#8a8070;">${priceSuffix}</div>
        </div>
    </div>`;
}

function resources(text) {
    return `<div class="reveal" style="margin-top:1rem;background:rgba(201,168,76,0.05);border-left:3px solid #c9a84c;border-radius:0 8px 8px 0;padding:0.8rem 1.2rem;">
        <p style="color:#8a8070;font-size:0.82rem;">⚙️ <strong style="color:#d4c9b0;">Ресурсы этапа:</strong> ${text}</p>
    </div>`;
}

function li(items, check = '✓') {
    return items.map(i => `<li>${check !== '' ? check + ' ' : ''}${i}</li>`).join('');
}

// ═══════════════════════════════════════════════════════════
//  СЛАЙД 1 — ТИТУЛЬНЫЙ
// ═══════════════════════════════════════════════════════════
function renderS1(d) {
    const headingHtml = d.heading.replace('\n', '<br>');
    return `
    <div class="slide active" data-slide="1">
        ${mesh([
            'width:520px;height:520px;top:-120px;right:-100px;background:#c9a84c;opacity:0.12;',
            'width:320px;height:320px;bottom:-80px;left:-80px;background:#8b6e2a;opacity:0.1;',
            'width:220px;height:220px;top:45%;left:18%;background:#e8d5a0;opacity:0.07;'
        ])}
        <canvas class="particle-canvas" style="position:absolute;inset:0;z-index:1;"></canvas>
        <div class="content text-center">
            <div style="font-size:90px;margin-bottom:1rem;animation:float 3.5s ease-in-out infinite;" class="reveal">${d.emoji}</div>
            <div class="gold-line mx-auto mb-4 reveal"></div>
            <h1 class="reveal" style="font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,6vw,5rem);font-weight:700;background:linear-gradient(135deg,#c9a84c,#e8d5a0,#c9a84c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:1.2rem;">${headingHtml}</h1>
            <p class="reveal" style="font-size:clamp(0.85rem,1.4vw,1.1rem);color:#8a8070;letter-spacing:0.35em;text-transform:uppercase;margin-bottom:0.5rem;">${d.subtitle}</p>
            <p class="reveal" style="font-size:clamp(0.75rem,1.2vw,0.95rem);color:#c9a84c;letter-spacing:0.2em;text-transform:uppercase;">${d.label}</p>
        </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  СЛАЙД 2 — ПРОБЛЕМА
// ═══════════════════════════════════════════════════════════
function renderS2(d) {
    const cards = d.cards.map(c => `
        <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.15);border-radius:14px;padding:1.4rem;border-left:3px solid #c44;display:flex;gap:1rem;align-items:flex-start;">
            <div style="font-size:1.8rem;flex-shrink:0;">${c.icon}</div>
            <div>
                <p style="font-weight:600;font-size:1rem;margin-bottom:0.4rem;color:#f5f0e8;">${c.title}</p>
                <p style="color:#8a8070;font-size:0.85rem;line-height:1.5;">${c.text}</p>
            </div>
        </div>`).join('');
    return `
    <div class="slide" data-slide="2">
        ${mesh([
            'width:380px;height:380px;top:-80px;right:-60px;background:#c9a84c;opacity:0.08;',
            'width:250px;height:250px;bottom:-50px;left:-40px;background:#8b6e2a;opacity:0.06;'
        ])}
        <div class="content">
            <div class="gold-line mb-4 reveal"></div>
            <h2 class="reveal" style="font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:700;color:#f5f0e8;margin-bottom:0.4rem;">${d.title}</h2>
            <p class="reveal" style="color:#8a8070;font-size:0.9rem;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:2rem;">${d.subtitle}</p>
            <div class="grid grid-cols-2 gap-5 reveal">${cards}</div>
        </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  СЛАЙДЫ 3-6 — BULLETS-СЛАЙДЫ (переиспользуемый шаблон)
// ═══════════════════════════════════════════════════════════
function renderBulletsSlide(d, num) {
    const cols = d.bullets.length <= 3 ? 'grid-cols-1' : 'grid-cols-2';
    const bulletsHtml = d.bullets.map(b => `
        <div style="display:flex;gap:0.9rem;align-items:flex-start;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.15);border-radius:12px;padding:1rem;">
            <div style="font-size:1.4rem;flex-shrink:0;">${b.icon}</div>
            <div>
                <p style="font-weight:600;font-size:0.88rem;margin-bottom:0.25rem;color:#e8d5a0;">${b.title}</p>
                <p style="color:#8a8070;font-size:0.78rem;line-height:1.5;">${b.text}</p>
            </div>
        </div>`).join('');
    return `
    <div class="slide" data-slide="${num}">
        ${mesh([
            'width:400px;height:400px;top:-80px;right:-60px;background:#c9a84c;opacity:0.09;',
            'width:250px;height:250px;bottom:-50px;left:-40px;background:#8b6e2a;opacity:0.07;'
        ])}
        <div class="content">
            <div class="gold-line mb-3 reveal"></div>
            <h2 class="reveal" style="font-family:'Cormorant Garamond',serif;font-size:clamp(1.7rem,3vw,2.5rem);font-weight:700;color:#f5f0e8;margin-bottom:0.3rem;">${d.title}</h2>
            <p class="reveal" style="color:#8a8070;font-size:0.82rem;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:1.2rem;">${d.subtitle}</p>
            <div class="grid ${cols} gap-3 reveal">${bulletsHtml}</div>
            <div class="reveal" style="margin-top:0.8rem;background:rgba(201,168,76,0.05);border-left:3px solid #c9a84c;border-radius:0 8px 8px 0;padding:0.8rem 1.2rem;">
                <p style="color:#d4c9b0;font-size:0.8rem;line-height:1.6;">${d.conclusion}</p>
            </div>
        </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  СЛАЙД 4 — КОНВЕЙЕР
// ═══════════════════════════════════════════════════════════
function renderS3(d) {
    const lastIdx = d.steps.length - 1;
    const stepsHtml = d.steps.map((s, i) => {
        const isLast = i === lastIdx;
        const border = isLast
            ? 'border:1px solid rgba(201,168,76,0.5);background:linear-gradient(135deg,rgba(201,168,76,0.25),rgba(201,168,76,0.1));'
            : (i === 0
                ? 'border:1px solid rgba(201,168,76,0.3);background:linear-gradient(135deg,rgba(201,168,76,0.18),rgba(201,168,76,0.06));'
                : 'border:1px solid rgba(201,168,76,0.22);background:linear-gradient(135deg,rgba(201,168,76,0.14),rgba(201,168,76,0.04));');
        const arrow = i < lastIdx ? `<div style="color:#c9a84c;font-size:1.4rem;padding:0 0.4rem;">→</div>` : '';
        return `
            <div style="${border}border-radius:12px;padding:1rem 1.2rem;text-align:center;min-width:120px;">
                <div style="font-size:1.8rem;margin-bottom:0.3rem;">${s.icon}</div>
                <p style="font-weight:700;font-size:0.88rem;color:#c9a84c;">${s.label}</p>
            </div>${arrow}`;
    }).join('');
    return `
    <div class="slide" data-slide="7">
        ${mesh([
            'width:400px;height:400px;top:-90px;left:-60px;background:#c9a84c;opacity:0.09;',
            'width:280px;height:280px;bottom:-60px;right:-50px;background:#8b6e2a;opacity:0.07;'
        ])}
        <canvas class="particle-canvas-ambient" style="position:absolute;inset:0;z-index:1;"></canvas>
        <div class="content text-center">
            <div class="gold-line mx-auto mb-4 reveal"></div>
            <h2 class="reveal" style="font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:700;color:#f5f0e8;margin-bottom:0.5rem;">${d.title}</h2>
            <p class="reveal" style="color:#8a8070;font-size:0.88rem;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:2.2rem;">${d.subtitle}</p>
            <div class="reveal" style="display:flex;align-items:center;gap:0;justify-content:center;flex-wrap:nowrap;">${stepsHtml}</div>
            <div class="reveal" style="margin-top:2rem;background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:1.2rem 2rem;display:inline-block;">
                <p style="color:#e8d5a0;font-size:1rem;font-weight:500;">${d.cta}</p>
            </div>
        </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  СЛАЙД 5 — СТРАТЕГИЯ
// ═══════════════════════════════════════════════════════════
function renderS4(d) {
    return `
    <div class="slide" data-slide="8">
        ${mesh([
            'width:360px;height:360px;top:-70px;right:-50px;background:#c9a84c;opacity:0.08;',
            'width:220px;height:220px;bottom:-40px;left:-30px;background:#8b6e2a;opacity:0.06;'
        ])}
        <div class="content">
            ${stageHeader(d)}
            <div class="grid grid-cols-2 gap-4">
                <div class="reveal" style="background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.15);border-radius:14px;padding:1.3rem;">
                    <p style="color:#c9a84c;font-weight:700;font-size:0.9rem;margin-bottom:0.8rem;">${d.includesTitle}</p>
                    <ul style="color:#d4c9b0;font-size:0.85rem;line-height:1.8;list-style:none;padding:0;">${li(d.includes)}</ul>
                </div>
                <div class="reveal" style="background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.2);border-radius:14px;padding:1.3rem;">
                    <p style="color:#c9a84c;font-weight:700;font-size:0.9rem;margin-bottom:0.8rem;">${d.benefitsTitle}</p>
                    <ul style="color:#d4c9b0;font-size:0.85rem;line-height:1.8;list-style:none;padding:0;">${li(d.benefits, '')}</ul>
                </div>
            </div>
            ${resources(d.resources)}
        </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  СЛАЙД 6 — ИНФРАСТРУКТУРА
// ═══════════════════════════════════════════════════════════
function renderS5(d) {
    const cards = d.cards.map(c => `
        <div class="reveal" style="background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.15);border-radius:14px;padding:1.2rem;text-align:center;">
            <div style="font-size:2rem;margin-bottom:0.5rem;">${c.icon}</div>
            <p style="color:#c9a84c;font-weight:700;font-size:0.88rem;margin-bottom:0.5rem;">${c.title}</p>
            <p style="color:#8a8070;font-size:0.8rem;line-height:1.6;">${c.text}</p>
        </div>`).join('');
    return `
    <div class="slide" data-slide="9">
        ${mesh([
            'width:350px;height:350px;top:-70px;left:-50px;background:#c9a84c;opacity:0.08;',
            'width:200px;height:200px;bottom:-40px;right:-30px;background:#8b6e2a;opacity:0.06;'
        ])}
        <div class="content">
            ${stageHeader(d)}
            <div class="grid grid-cols-3 gap-4">${cards}</div>
            <div class="reveal" style="margin-top:1.2rem;background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:1.1rem 1.5rem;">
                <p style="color:#e8d5a0;font-weight:600;font-size:0.9rem;margin-bottom:0.4rem;">${d.benefitTitle}</p>
                <p style="color:#d4c9b0;font-size:0.85rem;line-height:1.6;">${d.benefitText}</p>
            </div>
            ${resources(d.resources)}
        </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  СЛАЙД 7 — AI-БОТ ПРОДАЖ
// ═══════════════════════════════════════════════════════════
function renderS6(d) {
    const benefitsHtml = d.benefits.map(b => `
        <div style="display:flex;gap:0.8rem;align-items:flex-start;">
            <div style="color:#c9a84c;font-size:1rem;flex-shrink:0;">◆</div>
            <p style="color:#d4c9b0;font-size:0.85rem;line-height:1.5;"><strong style="color:#f5f0e8;">${b.title}</strong> — ${b.text}</p>
        </div>`).join('');
    return `
    <div class="slide" data-slide="10">
        ${mesh([
            'width:400px;height:400px;top:-80px;right:-70px;background:#c9a84c;opacity:0.1;',
            'width:250px;height:250px;bottom:-50px;left:-40px;background:#8b6e2a;opacity:0.08;'
        ])}
        <div class="content">
            ${stageHeader(d)}
            <div class="grid grid-cols-2 gap-5">

// ═══════════════════════════════════════════════════════════
//  РЕНДЕР ВСЕХ СЛАЙДОВ
// ═══════════════════════════════════════════════════════════
const C = CONTENT;
document.getElementById('deck').innerHTML = [
    renderS1(C.s1),
    renderS2(C.s2),
    renderBulletsSlide(C.s3, 3),
    renderBulletsSlide(C.s4, 4),
    renderBulletsSlide(C.s5, 5),
    renderBulletsSlide(C.s6, 6),
    renderS3(C.s7),
    renderS4(C.s8),
    renderS5(C.s9),
    renderS6(C.s10),
    renderS7(C.s11),
    renderS8(C.s12),
    renderS9(C.s13),
    renderS10(C.s14),
    renderS11(C.s15),
    renderS12(C.s16)
].join('');

document.title = C.meta.pageTitle;

// ═══════════════════════════════════════════════════════════
//  НАВИГАЦИЯ
// ═══════════════════════════════════════════════════════════
let current = 1;
const total = document.querySelectorAll('.slide').length;
const dotsContainer = document.getElementById('dots');
const counter = document.getElementById('counter');
for (let i = 1; i <= total; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 1 ? ' active' : '');
    dot.onclick = () => goToSlide(i);
    dotsContainer.appendChild(dot);
}
function goToSlide(n) {
    const prev = document.querySelector('.slide.active');
    const next = document.querySelector(`.slide[data-slide="${n}"]`);
    if (prev) prev.classList.remove('active');
    if (next) { next.classList.add('active'); animateSlide(next); }
    current = n; updateNav();
}
function changeSlide(dir) { let next = current + dir; if (next < 1) next = total; if (next > total) next = 1; goToSlide(next); }
function updateNav() {
    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i + 1 === current));
    counter.textContent = current + ' / ' + total;
}
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); changeSlide(1); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); changeSlide(-1); }
});
let touchStartX = 0;
document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', (e) => { const diff = touchStartX - e.changedTouches[0].clientX; if (Math.abs(diff) > 50) changeSlide(diff > 0 ? 1 : -1); });

// ═══════════════════════════════════════════════════════════
//  АНИМАЦИИ
// ═══════════════════════════════════════════════════════════
function animateSlide(slide) {
    slide.querySelectorAll('.reveal').forEach((el, i) => {
        el.style.transition = 'none';
        el.style.opacity = '0';
        el.style.transform = 'translateY(20px)';
        el.offsetHeight;
        const delay = i * 0.08;
        el.style.transition = `opacity 0.35s ease ${delay}s, transform 0.35s ease ${delay}s`;
        el.style.opacity = '1';
        el.style.transform = 'translateY(0px)';
    });
    animateSlideEffects(slide);
}

function animateSlideEffects(slide) {
    slide.querySelectorAll('[data-count]:not(.counted)').forEach(el => {
        el.classList.add('counted');
        const target = parseInt(el.dataset.count);
        const suffix = el.dataset.suffix || '', prefix = el.dataset.prefix || '';
        let cur = 0; const step = target / 40;
        const timer = setInterval(() => {
            cur += step;
            if (cur >= target) { cur = target; clearInterval(timer); }
            el.textContent = prefix + Math.round(cur).toLocaleString() + suffix;
        }, 30);
    });
    slide.querySelectorAll('.bar-fill:not(.fill-init)').forEach((bar, i) => {
        bar.classList.add('fill-init');
        bar.style.width = '0%';
        bar.style.transition = `width 0.6s ease ${i * 0.1}s`;
        bar.offsetHeight;
        bar.style.width = bar.dataset.width + '%';
    });
}

document.addEventListener('mousemove', (e) => {
    const spotlight = document.querySelector('.mouse-spotlight');
    if (spotlight) {
        spotlight.style.background = `radial-gradient(600px circle at ${e.clientX}px ${e.clientY}px, rgba(201,168,76,0.06), transparent 40%)`;
    }
});

window.initParticles = function(canvas, options) {
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
    const interactive = options.interactive !== false;
    const count = options.count || (interactive ? 55 : 18);
    let mx = -1000, my = -1000;
    const particles = Array.from({ length: count }, () => ({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
        size: Math.random() * 2.2 + 0.6, alpha: Math.random() * 0.3 + 0.08
    }));
    if (interactive) {
        canvas.addEventListener('mousemove', (e) => { const rect = canvas.getBoundingClientRect(); mx = e.clientX - rect.left; my = e.clientY - rect.top; });
        canvas.addEventListener('mouseleave', () => { mx = -1000; my = -1000; });
    }
    (function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            if (interactive) {
                const dx = p.x - mx, dy = p.y - my, dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 120) { const force = (120 - dist) / 120 * 2; p.vx += (dx / dist) * force * 0.1; p.vy += (dy / dist) * force * 0.1; }
            }
            p.vx *= 0.98; p.vy *= 0.98; p.x += p.vx; p.y += p.vy;
            if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(201,168,76,${p.alpha})`; ctx.fill();
        });
        requestAnimationFrame(animate);
    })();
};
document.querySelectorAll('.particle-canvas').forEach(c => window.initParticles(c, { interactive: true, count: 55 }));
document.querySelectorAll('.particle-canvas-ambient').forEach(c => window.initParticles(c, { interactive: false, count: 18 }));

try { animateSlide(document.querySelector('.slide.active')); } catch(e) { console.warn(e); }
</script>
